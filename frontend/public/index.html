<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Base favicon -->
    <link rel="icon"             type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="icon"             type="image/png" sizes="16x16" href="/favicon-16.png" />
    <link rel="apple-touch-icon" sizes="180x180"               href="/apple-touch-icon.png" />
    <link rel="manifest"                                        href="/site.webmanifest" />
    <meta name="theme-color" content="#06080F" />

    <!-- Default title & description (overridden per-page by react-helmet-async) -->
    <title>Axentralab — Web Dev, Cybersecurity & AI Automation Agency</title>
    <meta name="description" content="Axentralab builds high-performance web apps, SaaS platforms, and AI automation tools — and secures them with enterprise-grade cybersecurity. 150+ projects delivered worldwide." />

    <!-- Preconnect to Google Fonts (already used in pages) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Default Open Graph (overridden per-page) -->
    <meta property="og:type"        content="website" />
    <meta property="og:site_name"   content="Axentralab" />
    <meta property="og:image"       content="https://axentralab.com/og-default.png" />
    <meta property="og:image:width"  content="1200" />
    <meta property="og:image:height" content="630" />

    <!-- Twitter Card default -->
    <meta name="twitter:card"  content="summary_large_image" />
    <meta name="twitter:site"  content="@axentralab" />
    <meta name="twitter:image" content="https://axentralab.com/og-default.png" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
